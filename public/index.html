<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wellness Cafe — Order</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body>

<div class="qr-app">
  <header class="qr-header">
    <div style="display:flex;align-items:center;gap:12px">
      <img src="img/logo.png" alt="Wellness Cafe"
           style="width:54px;height:54px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#fff"
           onerror="this.outerHTML='<span style=&quot;font-size:36px&quot;>☕</span>'">
      <div style="flex:1">
        <h1 style="margin:0">Wellness Cafe</h1>
        <small><i>Relax · Reflect · Recharge</i> · Ground Floor, Block 7, FPM, UPSI</small>
      </div>
    </div>
    <div class="qr-table-info" id="tableInfo">📍 Choose your table below to start ordering</div>
  </header>

  <div class="qr-body">
    <div id="tablePicker" class="card" style="margin:14px 0">
      <div class="card-header"><h3>Select your table</h3></div>
      <div id="tableButtons" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        <div class="text-muted text-center" style="grid-column:span 4">Loading tables…</div>
      </div>
      <p class="text-muted text-center mt-3" style="font-size:11.5px">No table? <a href="#" id="takeaway" style="color:#10b981;font-weight:600">Order for takeaway</a></p>
    </div>

    <div id="menuArea" class="hidden">
      <div class="qr-cat-tabs" id="qrCatTabs"></div>
      <div class="qr-product-list" id="qrProducts"></div>
    </div>

    <!-- Live order status (shown after a customer has placed an order) -->
    <div id="statusView" class="hidden"></div>
  </div>

  <div class="qr-cart-bar hidden" id="qrCartBar">
    <div class="row">
      <div class="cnt" id="qrCartCount">0</div>
      <div class="info">
        <b id="qrCartTotal">RM 0.00</b>
        <small id="qrCartItems">0 items</small>
      </div>
      <button class="btn primary lg" id="qrViewCart">View Cart →</button>
    </div>
  </div>

  <!-- Discreet staff link for cafe staff to find their portal -->
  <!-- <div style="text-align:center;padding:24px 12px;font-size:11px;color:#94a3b8">
    <a href="staff.html" style="color:#94a3b8;text-decoration:none">Staff Portal</a>
  </div>
</div> -->

<div id="modalRoot"></div>
<div class="toast-container" id="toastContainer"></div>

<script>
const BASE_API = '/api/public';
let cafe = { name:'Wellness Cafe', currency:'RM', tax_rate:0.06 };
let categories = [];
let products = [];
let tables = [];
let currentCat = null;
let cart = [];
let tableId = null;
let mode = null; // 'dinein' | 'takeaway'

const $  = (s) => document.querySelector(s);
const $$ = (s) => [...document.querySelectorAll(s)];
const money = (n) => cafe.currency + ' ' + (+n).toFixed(2);

function toast(msg, type='success') {
  const c = $('#toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + (type==='error'?'error':'');
  t.innerHTML = `<b>${type==='error'?'Error':'OK'}</b>${msg}`;
  c.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='.2s'; }, 2200);
  setTimeout(()=>t.remove(), 2500);
}

async function fetchJson(method, path, body) {
  const opts = { method, headers: { 'Accept':'application/json', 'Content-Type':'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(BASE_API + path, opts);
  const text = await res.text();
  let data = null; try { data = text ? JSON.parse(text) : null; } catch(e){}
  if (!res.ok) { const err = new Error(data?.message || 'Network error'); err.payload = data; throw err; }
  return data;
}

async function loadData() {
  try {
    const menu = await fetchJson('GET', '/menu');
    cafe = menu.cafe || cafe;
    categories = menu.categories;
    products = menu.products;
    currentCat = categories[0]?.id;
    tables = await fetchJson('GET', '/tables');
    renderTables();
  } catch (err) {
    toast('Could not load menu: ' + err.message, 'error');
  }
}

function renderTables() {
  $('#tableButtons').innerHTML = tables.map(t =>
    `<button class="btn" data-tableid="${t.id}">${t.name} (${t.capacity})</button>`
  ).join('');
  $$('#tableButtons button[data-tableid]').forEach(b =>
    b.addEventListener('click', () => { tableId = +b.dataset.tableid; mode='dinein'; startMenu(); })
  );
}

$('#takeaway').addEventListener('click', e => {
  e.preventDefault();
  tableId = null; mode = 'takeaway';
  startMenu();
});

function startMenu() {
  $('#tablePicker').classList.add('hidden');
  $('#menuArea').classList.remove('hidden');
  $('#tableInfo').textContent = mode==='dinein'
    ? `📍 Ordering for Table ${tables.find(t=>t.id===tableId).name}`
    : '📦 Takeaway order';
  renderCats(); renderProducts();
}

function renderCats() {
  $('#qrCatTabs').innerHTML = categories.filter(c => c.id !== 6).map(c =>
    `<button class="qr-cat ${c.id===currentCat?'active':''}" data-id="${c.id}">${c.icon} ${c.name}</button>`
  ).join('');
  $$('#qrCatTabs .qr-cat').forEach(b => b.addEventListener('click', () => {
    currentCat = +b.dataset.id; renderCats(); renderProducts();
  }));
}

function renderProducts() {
  const prods = products.filter(p => p.category_id === currentCat && p.available);
  $('#qrProducts').innerHTML = prods.map(p => {
    const visual = p.image_url
      ? `<img src="${p.image_url}" style="width:70px;height:70px;border-radius:8px;object-fit:cover">`
      : (p.image || '🍽');
    return `<div class="qr-product">
      <div class="img">${visual}</div>
      <div class="name">${p.name}</div>
      <div class="price">${money(p.price)}</div>
      <button class="add" data-id="${p.id}">+ Add</button>
    </div>`;
  }).join('');
  $$('#qrProducts .add').forEach(b => b.addEventListener('click', () => {
    const p = products.find(x => x.id === +b.dataset.id);
    const ex = cart.find(x => x.productId === p.id);
    if (ex) ex.qty += 1;
    else cart.push({ productId: p.id, name: p.name, price: +p.price, qty: 1 });
    toast(`Added: ${p.name}`);
    refreshCartBar();
  }));
}

function refreshCartBar() {
  const cnt = cart.reduce((s,x) => s + x.qty, 0);
  const total = cart.reduce((s,x) => s + x.price * x.qty, 0);
  if (cnt === 0) { $('#qrCartBar').classList.add('hidden'); return; }
  $('#qrCartBar').classList.remove('hidden');
  $('#qrCartCount').textContent = cnt;
  $('#qrCartTotal').textContent = money(total);
  $('#qrCartItems').textContent = `${cnt} ${cnt===1?'item':'items'}`;
}

$('#qrViewCart').addEventListener('click', openCart);

function openCart() {
  const sub = cart.reduce((s,x)=>s+x.price*x.qty, 0);
  const tax = sub * cafe.tax_rate;
  const total = sub + tax;
  const html = `
    <div class="modal-head"><h3>🛒 Your Order</h3><button class="close-btn" onclick="document.getElementById('modalRoot').innerHTML=''">×</button></div>
    <div class="modal-body">
      ${cart.length===0 ? '<div class="empty"><span class="em">🛒</span>Cart is empty</div>' : ''}
      ${cart.map((it,i)=>`<div class="cart-item">
        <div class="info"><b>${it.name}</b><small>${money(it.price)} × ${it.qty}</small></div>
        <div class="qty-ctrl">
          <button data-act="dec" data-i="${i}">−</button>
          <span>${it.qty}</span>
          <button data-act="inc" data-i="${i}">+</button>
        </div>
      </div>`).join('')}
      ${cart.length>0?`
      <div class="cart-summary">
        <div class="sum-line"><span>Subtotal</span><span>${money(sub)}</span></div>
        <div class="sum-line"><span>Tax (${(cafe.tax_rate*100).toFixed(0)}%)</span><span>${money(tax)}</span></div>
        <div class="sum-line total"><span>Total</span><span>${money(total)}</span></div>
      </div>
      <div class="field mt-3"><label>Name (optional)</label><input id="qrName" placeholder="Your name"></div>
      <div class="field"><label>Notes for kitchen (optional)</label><input id="qrNotes" placeholder="e.g. Less sugar"></div>
      `:''}
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="document.getElementById('modalRoot').innerHTML=''">Keep Shopping</button>
      ${cart.length>0?`<button class="btn primary lg" id="qrCheckout">Place Order →</button>`:''}
    </div>`;
  $('#modalRoot').innerHTML = `<div class="modal-backdrop" onclick="if(event.target===this)this.remove()"><div class="modal">${html}</div></div>`;
  $$('#modalRoot .qty-ctrl button').forEach(b => b.addEventListener('click', () => {
    const i = +b.dataset.i, act = b.dataset.act;
    if (act==='inc') cart[i].qty += 1;
    else if (act==='dec') {
      if (cart[i].qty>1) cart[i].qty -= 1;
      else cart.splice(i,1);
    }
    refreshCartBar();
    openCart();
  }));
  const checkout = $('#qrCheckout');
  if (checkout) checkout.addEventListener('click', placeOrder);
}

async function placeOrder() {
  const customerName = ($('#qrName')?.value || '').trim() || 'QR Customer';
  const notes = ($('#qrNotes')?.value || '').trim();
  try {
    const order = await fetchJson('POST', '/orders', {
      items: cart.map(c => ({ product_id: c.productId, qty: c.qty })),
      table_id: tableId,
      customer_name: customerName,
      notes,
    });
    // Close the cart modal and switch the page to the live status view
    $('#modalRoot').innerHTML = '';
    cart = [];
    refreshCartBar();
    // Persist so a phone reload still shows the customer's order
    try { localStorage.setItem('wc_active_order', order.order_no); } catch(e){}
    showStatusView(order.order_no);
  } catch (err) {
    toast(err.payload?.message || 'Order failed: ' + err.message, 'error');
  }
}

/* ===== Live order status (post-order) ===== */
let statusPollTimer = null;
let lastStage = null;
let qrPayloadCache = null; // cache the DuitNow QR payload so we don't re-fetch on every poll
const STATUS_POLL_MS = 5000;

const STAGES = [
  { key:'waiting_payment', label:'Awaiting payment', icon:'💳', detail:'Scan the QR below to pay from your phone, or pay at the counter.' },
  { key:'preparing',       label:'Preparing',      icon:'👨‍🍳', detail:'The kitchen has received your order.' },
  { key:'ready',           label:'Ready for pickup', icon:'🛎', detail:'Your order is ready — please collect it.' },
  { key:'completed',       label:'Picked up',       icon:'✅', detail:'Enjoy! Thank you for visiting.' },
];

function stopStatusPoll() {
  if (statusPollTimer) { clearInterval(statusPollTimer); statusPollTimer = null; }
}

function showStatusView(orderNo) {
  $('#tablePicker').classList.add('hidden');
  $('#menuArea').classList.add('hidden');
  $('#qrCartBar').classList.add('hidden');
  $('#statusView').classList.remove('hidden');
  $('#tableInfo').textContent = `📋 Order ${orderNo}`;
  lastStage = null;
  qrPayloadCache = null;
  fetchAndRenderStatus(orderNo);
  stopStatusPoll();
  statusPollTimer = setInterval(() => fetchAndRenderStatus(orderNo), STATUS_POLL_MS);
}

/**
 * Ensure the DuitNow QR is drawn into the #payQrSlot container.
 * Called after every status render while stage === 'waiting_payment'.
 * Fetches the QR payload the first time, caches it for subsequent renders.
 */
async function ensurePayQrRendered(orderNo) {
  const slot = document.getElementById('payQrSlot');
  if (!slot) return;
  // Fetch payload once and cache
  if (!qrPayloadCache) {
    try {
      qrPayloadCache = await fetchJson('GET', `/orders/${encodeURIComponent(orderNo)}/duitnow-qr`);
    } catch (err) {
      slot.innerHTML = `<div class="alert alert-warn" style="font-size:12px;margin:0">
        Could not generate QR (${err.payload?.message || err.message}). Please pay at the counter.
      </div>`;
      return;
    }
  }
  // Build canvas (fresh on every render — innerHTML wipes it)
  slot.innerHTML = '<canvas id="payQrCanvas" width="220" height="220" style="display:block;margin:auto"></canvas>';
  try {
    new QRious({
      element: document.getElementById('payQrCanvas'),
      value: qrPayloadCache.payload,
      size: 220,
      level: 'M',
      background: '#ffffff',
      foreground: '#064e3b',
    });
  } catch (err) {
    slot.innerHTML = `<div class="alert alert-warn" style="font-size:12px;margin:0">
      Could not render QR. Please pay at the counter.
    </div>`;
  }
}

async function fetchAndRenderStatus(orderNo) {
  try {
    const data = await fetchJson('GET', `/orders/${encodeURIComponent(orderNo)}/status`);
    renderStatusView(data);
  } catch (err) {
    if (err.message?.includes('404') || err.payload?.message === 'Order not found') {
      stopStatusPoll();
      try { localStorage.removeItem('wc_active_order'); } catch(e){}
      $('#statusView').innerHTML = `
        <div class="card text-center" style="margin:14px 0;padding:20px">
          <div style="font-size:48px">❓</div>
          <h3>Order not found</h3>
          <p class="text-muted" style="font-size:13px">This order is no longer available.</p>
          <button class="btn primary lg block mt-3" onclick="location.reload()">Start New Order</button>
        </div>`;
    }
    // network blips: leave the previous render visible, retry next tick
  }
}

function renderStatusView(d) {
  const stageIndex = STAGES.findIndex(s => s.key === d.stage);
  const cur = STAGES[stageIndex] || STAGES[1];

  // Buzz + flash the first time the order becomes "ready"
  if (d.stage === 'ready' && lastStage && lastStage !== 'ready') {
    try { if (navigator.vibrate) navigator.vibrate([200, 80, 200, 80, 400]); } catch(e){}
    document.body.style.animation = 'qrFlash 1s ease 3';
    setTimeout(() => document.body.style.animation = '', 3500);
  }
  lastStage = d.stage;

  const stepsHtml = STAGES.map((s, i) => {
    const done = i < stageIndex;
    const active = i === stageIndex;
    const cls = done ? 'done' : active ? 'active' : 'todo';
    return `<div class="status-step ${cls}">
      <div class="dot">${done ? '✓' : (i+1)}</div>
      <div class="lbl"><b>${s.icon} ${s.label}</b></div>
    </div>`;
  }).join('');

  const heroCls = d.stage === 'ready' ? 'hero-ready'
                : d.stage === 'waiting_payment' ? 'hero-pay'
                : d.stage === 'completed' ? 'hero-done'
                : 'hero-cooking';

  const headline = {
    waiting_payment: 'Pay to start your order',
    preparing:       'Preparing your order…',
    ready:           '🎉 Ready for pickup!',
    completed:       'Order complete',
    refunded:        'Order refunded',
    cancelled:       'Order cancelled',
  }[d.stage] || 'Tracking your order…';

  const itemsHtml = (d.items || []).map(i => `<li><b>${i.qty}×</b> ${i.name}</li>`).join('');

  // DuitNow QR card — only when awaiting payment.
  // We render it as a placeholder div first; the QR canvas is drawn after the
  // HTML is in the DOM (so QRious can find the canvas element).
  const payCard = d.stage === 'waiting_payment' ? `
    <div class="card pay-card">
      <div class="card-header"><h3>💳 Pay with DuitNow QR</h3></div>
      <div class="pay-card-amount">
        <div class="lbl">Amount</div>
        <div class="val">${money(d.total)}</div>
      </div>
      <div id="payQrSlot" class="pay-qr-slot">
        <div class="pay-qr-loading">Generating QR…</div>
      </div>
      <ol class="pay-instructions">
        <li><b>Save</b> or screenshot the QR above (long-press the image on most phones).</li>
        <li>Open your banking app (Maybank, CIMB, MAE, TNG, Boost, etc.) → tap <b>Pay</b> or <b>Scan QR</b>.</li>
        <li>Tap <b>Upload from gallery</b> and pick the saved QR.</li>
        <li>The amount and reference are pre-filled — just confirm and pay.</li>
      </ol>
      <div class="pay-alt">
        <span>Prefer cash or card?</span> <b>Just walk up to the counter</b> — the cashier will help you pay there.
      </div>
      <div class="text-muted text-center" style="font-size:11px;margin-top:8px">
        Once you pay, this page will update automatically within a few seconds.
      </div>
    </div>` : '';

  $('#statusView').innerHTML = `
    <div class="status-hero ${heroCls}">
      <div class="status-icon">${cur.icon}</div>
      <h2>${headline}</h2>
      <div class="status-detail">${cur.detail}</div>
      <div class="status-orderno">Order <b>${d.order_no}</b></div>
    </div>

    <div class="status-steps card">
      ${stepsHtml}
    </div>

    ${payCard}

    <div class="card">
      <div class="card-header"><h3>Your Order</h3></div>
      <ul class="status-items">${itemsHtml}</ul>
      <div class="status-summary">
        <span>Total</span>
        <b>${money(d.total)}</b>
      </div>
      ${d.table ? `<div class="text-muted text-center" style="font-size:12px;margin-top:6px">Table ${d.table}</div>` : `<div class="text-muted text-center" style="font-size:12px;margin-top:6px">Takeaway — collect at counter</div>`}
    </div>

    <div class="text-center mt-3" style="padding-bottom:24px">
      <small class="text-muted">This page refreshes automatically every ${STATUS_POLL_MS/1000}s.</small><br>
      <button class="btn mt-3" onclick="startNewOrderFromStatus()">Start New Order</button>
    </div>
  `;

  // Render the DuitNow QR canvas after the HTML is in the DOM
  if (d.stage === 'waiting_payment') ensurePayQrRendered(d.order_no);
  else qrPayloadCache = null; // free cache once paid
}

function startNewOrderFromStatus() {
  if (!confirm('Start a new order? Your current order will keep going on the kitchen side.')) return;
  try { localStorage.removeItem('wc_active_order'); } catch(e){}
  location.reload();
}

// Resume status view if the customer reloads with an active order
function resumeOrderIfAny() {
  try {
    const orderNo = localStorage.getItem('wc_active_order');
    if (orderNo) { showStatusView(orderNo); return true; }
  } catch(e){}
  return false;
}

if (!resumeOrderIfAny()) loadData();
</script>

</body>
</html>
